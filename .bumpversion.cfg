[bumpversion]
commit = True
tag = True
tag_name = {new_version}
current_version = 1.0.0+halide.1
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)\+halide\.(?P<fork>\d+)
serialize =
	{major}.{minor}.{patch}+halide.{fork}

[bumpversion:part:fork]
first_value = 1

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"  # DO NOT EDIT THIS LINE MANUALLY. LET bump2version UTILITY DO IT
replace = version = "{new_version}"  # DO NOT EDIT THIS LINE MANUALLY. LET bump2version UTILITY DO IT

[bumpversion:file:src/mdformat_gfm/__init__.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
